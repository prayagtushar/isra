services:
  db:
    image: pgvector/pgvector:pg16
    container_name: isra-db
    environment:
      POSTGRES_USER: isra
      POSTGRES_PASSWORD: isra
      POSTGRES_DB: isra
    ports:
      - "5432:5432"
    volumes:
      - isra-pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isra"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  isra-pgdata:
