[project]
name = "isra-retrieval"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "pgvector",
    "sentence-transformers",
    "rank-bm25",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/isra_retrieval"]
