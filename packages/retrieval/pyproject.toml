[project]
name = "isra-retrieval"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "pgvector",
    "sentence-transformers",
    # torch is declared directly (not just via sentence-transformers) so the
    # root tool.uv.sources pin routes it to the CPU wheel index on Linux.
    "torch",
    "psycopg[binary]",
    "numpy",
    "python-dotenv",
]

[dependency-groups]
dev = ["pytest"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/isra_retrieval"]

[tool.hatch.build.targets.wheel.force-include]
"src/isra_retrieval/schema.sql" = "isra_retrieval/schema.sql"
