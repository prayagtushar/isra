# Cloud Build config for the ISRA API image.
# The Dockerfile lives at apps/api/Dockerfile but needs the repo root as its
# build context (uv workspace), so we can't use `gcloud builds submit --tag`.
#
# Submit with:
#   gcloud builds submit --config cloudbuild.yaml .
steps:
  - name: gcr.io/cloud-builders/docker
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/isra/api:latest
      - .
images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/isra/api:latest
timeout: 1800s
options:
  diskSizeGb: 50
